<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student VR View</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; display: flex; overflow: hidden; background: black; }
        .scene-half { width: 50vw; height: 100vh; position: relative; }
        
        .student-pointer {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 5px solid #ff6b6b;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px rgba(255, 107, 107, 1);
            animation: pulse-pointer 1s infinite;
        }
        
        .student-pointer::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 107, 107, 1);
        }
        
        @keyframes pulse-pointer {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1); 
                opacity: 1; 
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.3); 
                opacity: 0.6; 
            }
        }
    </style>
</head>
<body>
    <div class="scene-half" id="left-container">
        <div class="student-pointer" id="pointer-left"></div>
        <a-scene class="scene-half" embedded device-orientation-permission-ui="enabled: true">
            <a-camera id="camera-left" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
            <a-sky id="skyLeft" src="summer_solstice.jpeg" rotation="0 180 0"></a-sky>
        </a-scene>
    </div>
    
    <div class="scene-half" id="right-container">
        <div class="student-pointer" id="pointer-right"></div>
        <a-scene class="scene-half" embedded>
            <a-camera id="camera-right" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
            <a-sky id="skyRight" src="summer_solstice.jpeg" rotation="0 180 0"></a-sky>
        </a-scene>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUXUHdJ3oox3YSixJfoYuyRRrILe6n7ck",
            authDomain: "classroom-vrplanetarium.firebaseapp.com",
            databaseURL: "https://classroom-vrplanetarium-default-rtdb.firebaseio.com",
            projectId: "classroom-vrplanetarium",
            storageBucket: "classroom-vrplanetarium.firebasestorage.app",
            messagingSenderId: "613751774262",
            appId: "1:613751774262:web:79563f3843ef894e05cc97"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const IMAGES = {
            summer: { normal: "summer_solstice.jpeg", const: "summer_solstice_constellations.jpeg" },
            winter: { normal: "winter_solstice.jpeg", const: "winter_solstice_constellations.jpeg" },
            spring: { normal: "spring_equinox.jpeg", const: "spring_equinox_constellations.jpeg" },
            fall: { normal: "fall_equinox.jpeg", const: "fall_equinox_constellations.jpeg" }
        };
        
        let cameraLeft, cameraRight;
        
        // Wait for scenes to load
        let scenesLoaded = 0;
        document.querySelectorAll('a-scene').forEach(scene => {
            scene.addEventListener('loaded', function() {
                scenesLoaded++;
                if (scenesLoaded === 2) {
                    cameraLeft = document.getElementById('camera-left');
                    cameraRight = document.getElementById('camera-right');
                    console.log('✅ Student cameras ready');
                }
            });
        });
        
        // Listen for sky changes
        db.ref("classroom/currentView").on("value", snap => {
            const state = snap.val();
            if (!state) return;
            const img = state.constellations ? IMAGES[state.season].const : IMAGES[state.season].normal;
            document.getElementById("skyLeft").setAttribute("src", img);
            document.getElementById("skyRight").setAttribute("src", img);
        });
        
        // Listen for camera rotation changes from teacher
        db.ref("classroom/cameraRotation").on("value", snap => {
            const rotation = snap.val();
            if (!rotation || !cameraLeft || !cameraRight) return;
            
            // Apply teacher's rotation to both student cameras
            cameraLeft.setAttribute('rotation', {
                x: rotation.x,
                y: rotation.y,
                z: rotation.z
            });
            
            cameraRight.setAttribute('rotation', {
                x: rotation.x,
                y: rotation.y,
                z: rotation.z
            });
            
            console.log('📡 Camera synced:', rotation.y.toFixed(1) + '°');
        });
        
        // Listen for pointer updates
        db.ref("classroom/pointer").on("value", snap => {
            const pointer = snap.val();
            if (!pointer) return;
            
            const pointerLeft = document.getElementById('pointer-left');
            const pointerRight = document.getElementById('pointer-right');
            const leftContainer = document.getElementById('left-container');
            const rightContainer = document.getElementById('right-container');
            
            if (pointer.visible) {
                const leftX = (pointer.x / 100) * leftContainer.offsetWidth;
                const leftY = (pointer.y / 100) * leftContainer.offsetHeight;
                
                const rightX = (pointer.x / 100) * rightContainer.offsetWidth;
                const rightY = (pointer.y / 100) * rightContainer.offsetHeight;
                
                pointerLeft.style.display = 'block';
                pointerLeft.style.left = leftX + 'px';
                pointerLeft.style.top = leftY + 'px';
                
                pointerRight.style.display = 'block';
                pointerRight.style.left = rightX + 'px';
                pointerRight.style.top = rightY + 'px';
            } else {
                pointerLeft.style.display = 'none';
                pointerRight.style.display = 'none';
            }
        });
    </script>
</body>
</html>
