<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student VR View</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; display: flex; overflow: hidden; background: black; }
        .scene-half { width: 50vw; height: 100vh; }
    </style>
</head>
<body>
    <a-scene class="scene-half" embedded device-orientation-permission-ui="enabled: true">
        <a-camera look-controls wasd-controls="enabled: false"></a-camera>
        <a-sky id="skyLeft" src="summer_solstice.jpeg" rotation="0 180 0"></a-sky>
        
        <!-- 3D pointer marker -->
        <a-entity id="pointer-left" visible="false">
            <a-ring color="#ff6b6b" radius-inner="0.8" radius-outer="1.2" 
                    material="side: double; opacity: 0.9" 
                    animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 1000; loop: true; dir: alternate; easing: easeInOutQuad">
            </a-ring>
            <a-sphere color="#ff6b6b" radius="0.3" 
                      material="opacity: 1; shader: flat"
                      animation="property: components.material.material.opacity; from: 1; to: 0.4; dur: 1000; loop: true; dir: alternate">
            </a-sphere>
        </a-entity>
    </a-scene>
    
    <a-scene class="scene-half" embedded>
        <a-camera look-controls wasd-controls="enabled: false"></a-camera>
        <a-sky id="skyRight" src="summer_solstice.jpeg" rotation="0 180 0"></a-sky>
        
        <!-- 3D pointer marker -->
        <a-entity id="pointer-right" visible="false">
            <a-ring color="#ff6b6b" radius-inner="0.8" radius-outer="1.2" 
                    material="side: double; opacity: 0.9" 
                    animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 1000; loop: true; dir: alternate; easing: easeInOutQuad">
            </a-ring>
            <a-sphere color="#ff6b6b" radius="0.3" 
                      material="opacity: 1; shader: flat"
                      animation="property: components.material.material.opacity; from: 1; to: 0.4; dur: 1000; loop: true; dir: alternate">
            </a-sphere>
        </a-entity>
    </a-scene>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUXUHdJ3oox3YSixJfoYuyRRrILe6n7ck",
            authDomain: "classroom-vrplanetarium.firebaseapp.com",
            databaseURL: "https://classroom-vrplanetarium-default-rtdb.firebaseio.com",
            projectId: "classroom-vrplanetarium",
            storageBucket: "classroom-vrplanetarium.firebasestorage.app",
            messagingSenderId: "613751774262",
            appId: "1:613751774262:web:79563f3843ef894e05cc97"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const IMAGES = {
            summer: { normal: "summer_solstice.jpeg", const: "summer_solstice_constellations.jpeg" },
            winter: { normal: "winter_solstice.jpeg", const: "winter_solstice_constellations.jpeg" },
            spring: { normal: "spring_equinox.jpeg", const: "spring_equinox_constellations.jpeg" },
            fall: { normal: "fall_equinox.jpeg", const: "fall_equinox_constellations.jpeg" }
        };
        
        let pointerLeft, pointerRight, cameraLeft, cameraRight;
        let scenesLoaded = 0;
        
        // Wait for both scenes to load
        document.querySelectorAll('a-scene').forEach((scene, index) => {
            scene.addEventListener('loaded', function() {
                scenesLoaded++;
                if (scenesLoaded === 2) {
                    pointerLeft = document.getElementById('pointer-left');
                    pointerRight = document.getElementById('pointer-right');
                    
                    // Get cameras for lookAt functionality
                    cameraLeft = document.querySelectorAll('a-camera')[0];
                    cameraRight = document.querySelectorAll('a-camera')[1];
                    
                    console.log('✅ Student scenes ready');
                }
            });
        });
        
        // Listen for sky changes
        db.ref("classroom/currentView").on("value", snap => {
            const state = snap.val();
            if (!state) return;
            const img = state.constellations ? IMAGES[state.season].const : IMAGES[state.season].normal;
            document.getElementById("skyLeft").setAttribute("src", img);
            document.getElementById("skyRight").setAttribute("src", img);
        });
        
        // Listen for 3D pointer updates
        db.ref("classroom/pointer3D").on("value", snap => {
            const pointer = snap.val();
            if (!pointer || !pointerLeft || !pointerRight) return;
            
            if (pointer.visible) {
                // Place markers at the 3D position broadcast by teacher
                const position = { x: pointer.x, y: pointer.y, z: pointer.z };
                
                pointerLeft.setAttribute('position', position);
                pointerLeft.setAttribute('visible', true);
                
                pointerRight.setAttribute('position', position);
                pointerRight.setAttribute('visible', true);
                
                // Make markers face outward (toward cameras)
                if (cameraLeft && cameraRight) {
                    pointerLeft.object3D.lookAt(cameraLeft.object3D.position);
                    pointerRight.object3D.lookAt(cameraRight.object3D.position);
                }
                
                console.log('📍 Pointer visible at:', position);
            } else {
                pointerLeft.setAttribute('visible', false);
                pointerRight.setAttribute('visible', false);
            }
        });
    </script>
</body>
</html>
