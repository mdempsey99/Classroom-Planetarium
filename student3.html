<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student VR View</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; display: flex; overflow: hidden; background: black; }
        .scene-container { width: 50vw; height: 100vh; }
        #name-prompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            font-family: Arial, sans-serif;
        }
        #name-prompt.hidden { display: none; }
        .name-dialog {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
        }
        .name-dialog h2 {
            color: white;
            margin: 0 0 20px 0;
            font-size: 24px;
        }
        .name-dialog input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .name-dialog button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .name-dialog button:hover {
            transform: scale(1.05);
        }
        .name-dialog button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- Name entry prompt -->
    <div id="name-prompt">
        <div class="name-dialog">
            <h2>🌟 VR Star Map</h2>
            <input type="text" id="student-name-input" placeholder="Enter your name" maxlength="20" autocomplete="off">
            <button id="start-button" onclick="startSession()">Start Viewing</button>
        </div>
    </div>
    
    <!-- Left eye -->
    <div class="scene-container">
        <a-scene embedded device-orientation-permission-ui="enabled: true">
            <a-assets>
                <video id="starry-video-left" src="starrysky.mp4" loop crossorigin="anonymous"></video>
            </a-assets>
            
            <!-- Camera starts facing 180°; default FOV for proper VR stereoscopy -->
            <a-camera rotation="0 180 0" look-controls="magicWindowTrackingEnabled: true; touchEnabled: false" wasd-controls="enabled: false">
                <!-- Grey target feedback circle (always centered in view) -->
                <a-entity id="target-circle-left" visible="false">
                    <a-ring id="target-ring-left" position="0 0 -2" radius-inner="0.28" radius-outer="0.32" 
                            color="#808080" material="side: double; opacity: 0.4; transparent: true">
                    </a-ring>
                </a-entity>
            </a-camera>
            
            <!-- Sky rotation removed -->
            <a-sky id="skyLeft" src="summer_solstice.jpeg" rotation="0 0 0" visible="true"></a-sky>
            <a-videosphere id="videoLeft" src="#starry-video-left" rotation="0 0 0" visible="false"></a-videosphere>
            
            <a-entity id="pointer-left" visible="false">
                <a-ring color="#ff6b6b" radius-inner="8" radius-outer="12" 
                        material="side: double; opacity: 0.9" 
                        animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 1000; loop: true; dir: alternate">
                </a-ring>
                <a-sphere color="#ff6b6b" radius="4" 
                          material="opacity: 1; shader: flat"
                          animation="property: components.material.material.opacity; from: 1; to: 0.4; dur: 1000; loop: true; dir: alternate">
                </a-sphere>
            </a-entity>
        </a-scene>
    </div>
    
    <!-- Right eye -->
    <div class="scene-container">
        <a-scene embedded device-orientation-permission-ui="enabled: true">
            <a-assets>
                <video id="starry-video-right" src="starrysky.mp4" loop crossorigin="anonymous"></video>
            </a-assets>
            
            <!-- Camera starts facing 180°; default FOV for proper VR stereoscopy -->
            <a-camera rotation="0 180 0" look-controls="magicWindowTrackingEnabled: true; touchEnabled: false" wasd-controls="enabled: false">
                <!-- Grey target feedback circle (always centered in view) -->
                <a-entity id="target-circle-right" visible="false">
                    <a-ring id="target-ring-right" position="0 0 -2" radius-inner="0.28" radius-outer="0.32" 
                            color="#808080" material="side: double; opacity: 0.4; transparent: true">
                    </a-ring>
                </a-entity>
            </a-camera>
            
            <!-- Sky rotation removed -->
            <a-sky id="skyRight" src="summer_solstice.jpeg" rotation="0 0 0" visible="true"></a-sky>
            <a-videosphere id="videoRight" src="#starry-video-right" rotation="0 0 0" visible="false"></a-videosphere>
            
            <a-entity id="pointer-right" visible="false">
                <a-ring color="#ff6b6b" radius-inner="8" radius-outer="12" 
                        material="side: double; opacity: 0.9" 
                        animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 1000; loop: true; dir: alternate">
                </a-ring>
                <a-sphere color="#ff6b6b" radius="4" 
                          material="opacity: 1; shader: flat"
                          animation="property: components.material.material.opacity; from: 1; to: 0.4; dur: 1000; loop: true; dir: alternate">
                </a-sphere>
            </a-entity>
        </a-scene>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUXUHdJ3oox3YSixJfoYuyRRrILe6n7ck",
            authDomain: "classroom-vrplanetarium.firebaseapp.com",
            databaseURL: "https://classroom-vrplanetarium-default-rtdb.firebaseio.com",
            projectId: "classroom-vrplanetarium",
            storageBucket: "classroom-vrplanetarium.firebasestorage.app",
            messagingSenderId: "613751774262",
            appId: "1:613751774262:web:79563f3843ef894e05cc97"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const IMAGES = {
            summer: { normal: "summer_solstice.jpeg", const: "summer_solstice_constellations.jpeg" },
            winter: { normal: "winter_solstice.jpeg", const: "winter_solstice_constellations.jpeg" },
            spring: { normal: "spring_equinox.jpeg", const: "spring_equinox_constellations.jpeg" },
            fall: { normal: "fall_equinox.jpeg", const: "fall_equinox_constellations.jpeg" }
        };
        
        let pointerLeft, pointerRight, skyLeft, skyRight, videoLeft, videoRight;
        let videoElemLeft, videoElemRight;
        let targetCircleLeft, targetCircleRight;
        let targetRingLeft, targetRingRight;
        let targetDirection = null;
        let scenesLoaded = 0;
        let studentId = 'student_' + Math.random().toString(36).substr(2, 9);
        let studentName = '';
        let heartbeatInterval;
        let cameraLeft, cameraRight;
        
        // Start session after name is entered
        function startSession() {
            const nameInput = document.getElementById('student-name-input');
            const name = nameInput.value.trim();
            
            if (name.length === 0) {
                alert('Please enter your name');
                return;
            }
            
            studentName = name;
            document.getElementById('name-prompt').classList.add('hidden');
            
            // Start heartbeat after name is set
            sendHeartbeat();
            heartbeatInterval = setInterval(sendHeartbeat, 500);
        }
        
        // Allow Enter key to submit
        document.addEventListener('DOMContentLoaded', function() {
            const nameInput = document.getElementById('student-name-input');
            nameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    startSession();
                }
            });
            nameInput.focus();
        });
        
        // Send heartbeat and camera rotation
        function sendHeartbeat() {
            const data = {
                name: studentName || "Student " + studentId.slice(-4),
                lastSeen: Date.now(),
                connected: true
            };
            
            // Add camera rotation if available
            if (cameraLeft) {
                const rotation = cameraLeft.getAttribute('rotation');
                // Account for initial 180° rotation - normalize to actual compass direction
                let normalizedY = rotation.y;
                // Camera starts at 180° but reports as 0°, so we don't need to adjust
                // The rotation.y already gives us the correct direction
                data.rotation = {
                    x: Math.round(rotation.x),
                    y: Math.round(normalizedY),
                    z: Math.round(rotation.z)
                };
            }
            
            db.ref("classroom/students/" + studentId).set(data);
        }
        
        // Clean up when leaving
        window.addEventListener('beforeunload', () => {
            db.ref("classroom/students/" + studentId).remove();
            clearInterval(heartbeatInterval);
        });
        
        document.querySelectorAll('a-scene').forEach(scene => {
            scene.addEventListener('loaded', function() {
                scenesLoaded++;
                if (scenesLoaded === 2) {
                    pointerLeft  = document.getElementById('pointer-left');
                    pointerRight = document.getElementById('pointer-right');
                    skyLeft      = document.getElementById('skyLeft');
                    skyRight     = document.getElementById('skyRight');
                    videoLeft    = document.getElementById('videoLeft');
                    videoRight   = document.getElementById('videoRight');
                    videoElemLeft  = document.getElementById('starry-video-left');
                    videoElemRight = document.getElementById('starry-video-right');
                    targetCircleLeft  = document.getElementById('target-circle-left');
                    targetCircleRight = document.getElementById('target-circle-right');
                    targetRingLeft = document.getElementById('target-ring-left');
                    targetRingRight = document.getElementById('target-ring-right');
                    
                    // Get camera reference for rotation tracking
                    cameraLeft = document.querySelectorAll('a-camera')[0];
                    
                    console.log('✅ Student3 scenes ready');
                }
            });
        });
        
        // Listen for view changes
        db.ref("classroom/currentView").on("value", snap => {
            const state = snap.val();
            if (!state || !skyLeft) return;
            
            if (state.mode === 'video') {
                skyLeft.setAttribute('visible', false);
                skyRight.setAttribute('visible', false);
                videoLeft.setAttribute('visible', true);
                videoRight.setAttribute('visible', true);
                
                if (state.playing) {
                    videoElemLeft.play();
                    videoElemRight.play();
                } else {
                    videoElemLeft.pause();
                    videoElemRight.pause();
                }
            } else {
                videoElemLeft.pause();
                videoElemRight.pause();
                videoLeft.setAttribute('visible', false);
                videoRight.setAttribute('visible', false);
                skyLeft.setAttribute('visible', true);
                skyRight.setAttribute('visible', true);
                
                const img = state.constellations ? IMAGES[state.season].const : IMAGES[state.season].normal;
                skyLeft.setAttribute("src", img);
                skyRight.setAttribute("src", img);
            }
        });
        
        // Marker updates
        db.ref("classroom/marker").on("value", snap => {
            const data = snap.val();
            if (!data || !pointerLeft || !pointerRight) return;
            
            if (data.visible === false) {
                pointerLeft.setAttribute('visible', false);
                pointerRight.setAttribute('visible', false);
                return;
            }
            
            const x = data.x * 100;
            const y = data.y * 100;
            const z = data.z * 100;
            
            pointerLeft.setAttribute("position", `${x} ${y} ${z}`);
            pointerLeft.setAttribute("visible", true);
            
            pointerRight.setAttribute("position", `${x} ${y} ${z}`);
            pointerRight.setAttribute("visible", true);
        });
        
        // Target updates - show grey circle when target is active
        db.ref("classroom/target").on("value", snap => {
            const data = snap.val();
            if (!data || !targetCircleLeft || !targetCircleRight) return;
            
            if (data.visible === false) {
                targetCircleLeft.setAttribute('visible', false);
                targetCircleRight.setAttribute('visible', false);
                targetDirection = null;
            } else {
                targetCircleLeft.setAttribute('visible', true);
                targetCircleRight.setAttribute('visible', true);
                
                // Store target direction for checking
                targetDirection = {
                    x: data.x,
                    y: data.y,
                    z: data.z
                };
            }
        });
        
        // Check if looking at target every 200ms
        setInterval(function() {
            if (!targetDirection || !cameraLeft || !targetRingLeft) return;
            
            const rotation = cameraLeft.getAttribute('rotation');
            const yawRad = rotation.y * Math.PI / 180;
            const pitchRad = -rotation.x * Math.PI / 180;
            
            const studentDir = {
                x: Math.sin(yawRad) * Math.cos(pitchRad),
                y: Math.sin(pitchRad),
                z: Math.cos(yawRad) * Math.cos(pitchRad)
            };
            
            // Normalize
            const len = Math.sqrt(studentDir.x * studentDir.x + studentDir.y * studentDir.y + studentDir.z * studentDir.z);
            studentDir.x /= len;
            studentDir.y /= len;
            studentDir.z /= len;
            
            // Calculate dot product
            const dot = studentDir.x * targetDirection.x + 
                       studentDir.y * targetDirection.y + 
                       studentDir.z * targetDirection.z;
            
            // Check if looking at target (within tolerance)
            const foundTarget = Math.abs(dot) > 0.95;
            
            // Change color based on whether target is found
            const color = foundTarget ? '#4CAF50' : '#808080'; // Green if found, grey if not
            targetRingLeft.setAttribute('color', color);
            targetRingRight.setAttribute('color', color);
        }, 200);
    </script>
</body>
</html>
