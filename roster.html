<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Roster - VR Star Map</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            color: white;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            color: white;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .stat-label {
            font-size: 14px;
            color: #B0BEC5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .filters {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .filter-label {
            color: white;
            font-weight: bold;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .filter-btn.active {
            background: #4CAF50;
            border-color: #4CAF50;
            font-weight: bold;
        }
        
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .student-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .student-card.found-target {
            border: 3px solid #4CAF50;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1) 0%, rgba(255, 255, 255, 0.95) 50%);
        }
        
        .student-card.not-found {
            border: 3px solid #ff6b6b;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1) 0%, rgba(255, 255, 255, 0.95) 50%);
        }
        
        .status-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .student-name {
            font-size: 20px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 15px;
            padding-right: 30px;
        }
        
        .student-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        
        .info-label {
            color: #666;
            font-weight: 500;
        }
        
        .info-value {
            color: #333;
            font-weight: bold;
        }
        
        .direction-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }
        
        .dir-north { background: #2196F3; }
        .dir-south { background: #FF9800; }
        .dir-east { background: #9C27B0; }
        .dir-west { background: #4CAF50; }
        .dir-ne { background: #3F51B5; }
        .dir-nw { background: #00BCD4; }
        .dir-se { background: #FF5722; }
        .dir-sw { background: #8BC34A; }
        
        .target-status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }
        
        .target-status.found {
            background: #4CAF50;
            color: white;
        }
        
        .target-status.searching {
            background: #FFB74D;
            color: #333;
        }
        
        .target-status.inactive {
            background: #E0E0E0;
            color: #666;
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 18px;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <header>
        <h1>
            <span>📱</span>
            <span>Class Roster</span>
        </h1>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="total-count">0</div>
                <div class="stat-label">Online</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="found-count">0</div>
                <div class="stat-label">Found Target</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="searching-count">0</div>
                <div class="stat-label">Searching</div>
            </div>
        </div>
    </header>
    
    <div class="filters">
        <span class="filter-label">Filter:</span>
        <button class="filter-btn active" data-filter="all">All Students</button>
        <button class="filter-btn" data-filter="found">Found Target</button>
        <button class="filter-btn" data-filter="searching">Still Searching</button>
        <button class="filter-btn" data-filter="no-target">No Active Target</button>
    </div>
    
    <div class="roster-grid" id="roster-grid">
        <div class="empty-state">
            <div class="empty-icon">👥</div>
            <div>Waiting for students to connect...</div>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUXUHdJ3oox3YSixJfoYuyRRrILe6n7ck",
            authDomain: "classroom-vrplanetarium.firebaseapp.com",
            databaseURL: "https://classroom-vrplanetarium-default-rtdb.firebaseio.com",
            projectId: "classroom-vrplanetarium",
            storageBucket: "classroom-vrplanetarium.firebasestorage.app",
            messagingSenderId: "613751774262",
            appId: "1:613751774262:web:79563f3843ef894e05cc97"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let targetDirection = null;
        let targetActive = false;
        let currentFilter = 'all';
        
        // Direction helper function
        function getDirection(yaw) {
            if (yaw >= -22.5 && yaw < 22.5) return { label: 'South', class: 'dir-south' };
            if (yaw >= 22.5 && yaw < 67.5) return { label: 'SW', class: 'dir-sw' };
            if (yaw >= 67.5 && yaw < 112.5) return { label: 'West', class: 'dir-west' };
            if (yaw >= 112.5 && yaw < 157.5) return { label: 'NW', class: 'dir-nw' };
            if (yaw >= 157.5 || yaw < -157.5) return { label: 'North', class: 'dir-north' };
            if (yaw >= -157.5 && yaw < -112.5) return { label: 'NE', class: 'dir-ne' };
            if (yaw >= -112.5 && yaw < -67.5) return { label: 'East', class: 'dir-east' };
            return { label: 'SE', class: 'dir-se' };
        }
        
        function getAltitudeDesc(pitch) {
            if (pitch < -60) return 'Far Down';
            if (pitch < -30) return 'Down';
            if (pitch < -10) return 'Slight Down';
            if (pitch <= 10) return 'Horizon';
            if (pitch <= 30) return 'Slight Up';
            if (pitch <= 60) return 'Up';
            return 'Far Up';
        }
        
        function isLookingAtTarget(rotation) {
            if (!targetDirection || !rotation) return false;
            
            const yawRad = rotation.y * Math.PI / 180;
            const pitchRad = -rotation.x * Math.PI / 180;
            
            const studentDir = {
                x: Math.sin(yawRad) * Math.cos(pitchRad),
                y: Math.sin(pitchRad),
                z: Math.cos(yawRad) * Math.cos(pitchRad)
            };
            
            const len = Math.sqrt(studentDir.x * studentDir.x + studentDir.y * studentDir.y + studentDir.z * studentDir.z);
            studentDir.x /= len;
            studentDir.y /= len;
            studentDir.z /= len;
            
            const dot = studentDir.x * targetDirection.x + 
                       studentDir.y * targetDirection.y + 
                       studentDir.z * targetDirection.z;
            
            return Math.abs(dot) > 0.995;
        }
        
        function updateRoster() {
            db.ref("classroom/students").once("value", snapshot => {
                const students = snapshot.val() || {};
                const now = Date.now();
                const activeStudents = {};
                
                // Filter active students
                Object.keys(students).forEach(id => {
                    const student = students[id];
                    if (now - student.lastSeen < 10000) {
                        activeStudents[id] = student;
                    }
                });
                
                const studentArray = Object.entries(activeStudents);
                
                // Update stats
                const totalCount = studentArray.length;
                let foundCount = 0;
                let searchingCount = 0;
                
                if (targetActive) {
                    studentArray.forEach(([id, student]) => {
                        if (student.rotation && isLookingAtTarget(student.rotation)) {
                            foundCount++;
                        } else {
                            searchingCount++;
                        }
                    });
                }
                
                document.getElementById('total-count').textContent = totalCount;
                document.getElementById('found-count').textContent = foundCount;
                document.getElementById('searching-count').textContent = searchingCount;
                
                // Render roster
                const grid = document.getElementById('roster-grid');
                
                if (totalCount === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">👥</div>
                            <div>Waiting for students to connect...</div>
                        </div>
                    `;
                    return;
                }
                
                // Sort by name
                studentArray.sort((a, b) => (a[1].name || '').localeCompare(b[1].name || ''));
                
                grid.innerHTML = '';
                
                studentArray.forEach(([id, student]) => {
                    const foundTarget = targetActive && student.rotation && isLookingAtTarget(student.rotation);
                    
                    // Apply filter
                    if (currentFilter === 'found' && !foundTarget) return;
                    if (currentFilter === 'searching' && (!targetActive || foundTarget)) return;
                    if (currentFilter === 'no-target' && targetActive) return;
                    
                    const card = document.createElement('div');
                    card.className = 'student-card';
                    if (targetActive) {
                        card.classList.add(foundTarget ? 'found-target' : 'not-found');
                    }
                    
                    let rotationHTML = '';
                    if (student.rotation) {
                        const dir = getDirection(student.rotation.y);
                        const altDesc = getAltitudeDesc(student.rotation.x);
                        rotationHTML = `
                            <div class="info-row">
                                <span class="info-label">Direction:</span>
                                <span class="direction-badge ${dir.class}">${dir.label}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Azimuth:</span>
                                <span class="info-value">${student.rotation.y}°</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Altitude:</span>
                                <span class="info-value">${student.rotation.x}° (${altDesc})</span>
                            </div>
                        `;
                    }
                    
                    let targetStatusHTML = '';
                    if (targetActive) {
                        if (foundTarget) {
                            targetStatusHTML = '<div class="target-status found">✅ TARGET FOUND</div>';
                        } else {
                            targetStatusHTML = '<div class="target-status searching">🔍 Searching...</div>';
                        }
                    } else {
                        targetStatusHTML = '<div class="target-status inactive">No Active Target</div>';
                    }
                    
                    const secondsAgo = Math.floor((now - student.lastSeen) / 1000);
                    const lastSeen = secondsAgo === 0 ? 'just now' : `${secondsAgo}s ago`;
                    
                    card.innerHTML = `
                        <div class="status-indicator"></div>
                        <div class="student-name">${student.name || 'Student ' + id.slice(-4)}</div>
                        <div class="student-info">
                            <div class="info-row">
                                <span class="info-label">Last Update:</span>
                                <span class="info-value">${lastSeen}</span>
                            </div>
                            ${rotationHTML}
                        </div>
                        ${targetStatusHTML}
                    `;
                    
                    grid.appendChild(card);
                });
            });
        }
        
        // Listen for target changes
        db.ref("classroom/target").on("value", snap => {
            const data = snap.val();
            targetActive = data && data.visible === true;
            if (targetActive) {
                targetDirection = {
                    x: data.x,
                    y: data.y,
                    z: data.z
                };
            } else {
                targetDirection = null;
            }
            updateRoster();
        });
        
        // Update roster every 500ms
        setInterval(updateRoster, 500);
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.getAttribute('data-filter');
                updateRoster();
            });
        });
        
        // Initial load
        updateRoster();
    </script>
</body>
</html>
