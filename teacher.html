<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Control - VR Star Map</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #000; cursor: crosshair; }
        #controls { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; 
                    background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; display: flex; 
                    gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 20px; margin: 0; font-weight: bold; border: none; border-radius: 8px; 
                 cursor: pointer; color: white; font-size: 14px; transition: all 0.3s ease; }
        button:hover { transform: scale(1.05); }
        .season-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        #const-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        #const-btn.active { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #000; }
        #pointer-btn { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        #pointer-btn.active { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%); }
        #status { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); 
                  color: white; padding: 10px 15px; border-radius: 8px; font-size: 14px; z-index: 1000; }
    </style>
</head>
<body>
    <div id="controls">
        <button class="season-btn" onclick="changeSeason('summer')">☀️ Summer</button>
        <button class="season-btn" onclick="changeSeason('winter')">❄️ Winter</button>
        <button class="season-btn" onclick="changeSeason('spring')">🌸 Spring</button>
        <button class="season-btn" onclick="changeSeason('fall')">🍂 Fall</button>
        <button id="const-btn" onclick="toggleConstellations()">Show Constellations</button>
        <button id="pointer-btn" onclick="togglePointer()">Enable Pointer</button>
    </div>
    
    <div id="status">
        <div>Season: <span id="season-display">Summer</span></div>
        <div>Constellations: <span id="const-display">Off</span></div>
        <div>Pointer: <span id="pointer-display">Off</span></div>
        <div style="font-size: 11px; margin-top: 5px; color: #90caf9;">Click on sky to place pointer</div>
    </div>
    
    <a-scene cursor="rayOrigin: mouse">
        <a-camera look-controls wasd-controls="enabled: false"></a-camera>
        <a-sky id="star-sky" src="summer_solstice.jpeg" rotation="0 180 0" class="clickable"></a-sky>
        
        <!-- 3D pointer marker in the sky -->
        <a-entity id="pointer-marker" visible="false">
            <a-ring color="#ff6b6b" radius-inner="0.8" radius-outer="1.2" 
                    material="side: double; opacity: 0.9" 
                    animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 1000; loop: true; dir: alternate; easing: easeInOutQuad">
            </a-ring>
            <a-sphere color="#ff6b6b" radius="0.3" 
                      material="opacity: 1; shader: flat"
                      animation="property: components.material.material.opacity; from: 1; to: 0.4; dur: 1000; loop: true; dir: alternate">
            </a-sphere>
        </a-entity>
    </a-scene>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUXUHdJ3oox3YSixJfoYuyRRrILe6n7ck",
            authDomain: "classroom-vrplanetarium.firebaseapp.com",
            databaseURL: "https://classroom-vrplanetarium-default-rtdb.firebaseio.com",
            projectId: "classroom-vrplanetarium",
            storageBucket: "classroom-vrplanetarium.firebasestorage.app",
            messagingSenderId: "613751774262",
            appId: "1:613751774262:web:79563f3843ef894e05cc97"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const STAR_MAPS = {
            summer: { normal: "summer_solstice.jpeg", const: "summer_solstice_constellations.jpeg" },
            winter: { normal: "winter_solstice.jpeg", const: "winter_solstice_constellations.jpeg" },
            spring: { normal: "spring_equinox.jpeg", const: "spring_equinox_constellations.jpeg" },
            fall: { normal: "fall_equinox.jpeg", const: "fall_equinox_constellations.jpeg" }
        };
        
        let currentSeason = "summer";
        let constellationsVisible = false;
        let pointerEnabled = false;
        let camera, scene, sky, pointerMarker;
        
        // Wait for scene to load
        document.querySelector('a-scene').addEventListener('loaded', function() {
            scene = this;
            camera = scene.camera.el;
            sky = document.getElementById('star-sky');
            pointerMarker = document.getElementById('pointer-marker');
            
            // Set up click handler for placing pointer
            sky.addEventListener('click', handleSkyClick);
        });
        
        function handleSkyClick(evt) {
            if (!pointerEnabled) return;
            
            // Get the intersection point where click hit the sky sphere
            const intersection = evt.detail.intersection;
            if (!intersection) return;
            
            const point = intersection.point;
            
            // Place marker at that 3D position
            pointerMarker.setAttribute('position', point);
            pointerMarker.setAttribute('visible', true);
            
            // Look at camera so it faces outward
            pointerMarker.object3D.lookAt(camera.object3D.position);
            
            console.log('📍 Pointer placed at:', point);
            
            // Broadcast 3D position to students
            db.ref("classroom/pointer3D").set({
                x: point.x,
                y: point.y,
                z: point.z,
                visible: true,
                timestamp: Date.now()
            });
        }
        
        function updateSky() {
            const img = constellationsVisible ? STAR_MAPS[currentSeason].const : STAR_MAPS[currentSeason].normal;
            document.getElementById("star-sky").setAttribute("src", img);
            document.getElementById('season-display').textContent = currentSeason.charAt(0).toUpperCase() + currentSeason.slice(1);
            document.getElementById('const-display').textContent = constellationsVisible ? 'On' : 'Off';
            
            const constBtn = document.getElementById('const-btn');
            constBtn.classList.toggle('active', constellationsVisible);
            constBtn.textContent = constellationsVisible ? 'Hide Constellations' : 'Show Constellations';
            
            db.ref("classroom/currentView").set({
                season: currentSeason,
                constellations: constellationsVisible,
                timestamp: Date.now()
            });
        }
        
        function changeSeason(season) { 
            currentSeason = season; 
            updateSky(); 
        }
        
        function toggleConstellations() { 
            constellationsVisible = !constellationsVisible; 
            updateSky(); 
        }
        
        function togglePointer() {
            pointerEnabled = !pointerEnabled;
            const btn = document.getElementById('pointer-btn');
            
            btn.classList.toggle('active', pointerEnabled);
            btn.textContent = pointerEnabled ? 'Click Sky to Point' : 'Enable Pointer';
            document.getElementById('pointer-display').textContent = pointerEnabled ? 'On' : 'Off';
            
            if (!pointerEnabled) {
                pointerMarker.setAttribute('visible', false);
                db.ref("classroom/pointer3D").set({
                    visible: false,
                    timestamp: Date.now()
                });
            }
        }
        
        updateSky();
    </script>
</body>
</html>
