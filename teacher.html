<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Control - VR Star Map</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #000; }
        #controls { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; 
                    background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; display: flex; 
                    gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 20px; margin: 0; font-weight: bold; border: none; border-radius: 8px; 
                 cursor: pointer; color: white; font-size: 14px; transition: all 0.3s ease; }
        button:hover { transform: scale(1.05); }
        .season-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        #const-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        #const-btn.active { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #000; }
        #status { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); 
                  color: white; padding: 10px 15px; border-radius: 8px; font-size: 14px; z-index: 1000; }
    </style>
</head>
<body>
    <div id="controls">
        <button class="season-btn" data-season="summer">☀️ Summer</button>
        <button class="season-btn" data-season="winter">❄️ Winter</button>
        <button class="season-btn" data-season="spring">🌸 Spring</button>
        <button class="season-btn" data-season="fall">🍂 Fall</button>
        <button id="const-btn">Show Constellations</button>
    </div>
    
    <div id="status">
        <div>Season: <span id="season-display">Summer</span></div>
        <div>Constellations: <span id="const-display">Off</span></div>
        <div style="font-size: 11px; margin-top: 5px; color: #90caf9;">
            Click on sky to place pointer
        </div>
    </div>
    
    <a-scene>
        <a-camera id="teacherCam" look-controls wasd-controls="enabled: false"></a-camera>
        <a-sky id="star-sky" src="summer_solstice.jpeg" rotation="0 180 0"></a-sky>
        
        <!-- Teacher marker -->
        <a-entity id="marker" visible="false">
            <a-ring color="#ff6b6b" radius-inner="3" radius-outer="5" 
                    material="side: double; opacity: 0.9" 
                    animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 1000; loop: true; dir: alternate">
            </a-ring>
            <a-sphere color="#ff6b6b" radius="2" 
                      material="opacity: 1; shader: flat"
                      animation="property: components.material.material.opacity; from: 1; to: 0.4; dur: 1000; loop: true; dir: alternate">
            </a-sphere>
        </a-entity>
    </a-scene>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUXUHdJ3oox3YSixJfoYuyRRrILe6n7ck",
            authDomain: "classroom-vrplanetarium.firebaseapp.com",
            databaseURL: "https://classroom-vrplanetarium-default-rtdb.firebaseio.com",
            projectId: "classroom-vrplanetarium",
            storageBucket: "classroom-vrplanetarium.firebasestorage.app",
            messagingSenderId: "613751774262",
            appId: "1:613751774262:web:79563f3843ef894e05cc97"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const STAR_MAPS = {
            summer: { normal: "summer_solstice.jpeg", const: "summer_solstice_constellations.jpeg" },
            winter: { normal: "winter_solstice.jpeg", const: "winter_solstice_constellations.jpeg" },
            spring: { normal: "spring_equinox.jpeg", const: "spring_equinox_constellations.jpeg" },
            fall: { normal: "fall_equinox.jpeg", const: "fall_equinox_constellations.jpeg" }
        };
        
        let currentSeason = "summer";
        let constellationsVisible = false;
        let marker;
        
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener('loaded', function() {
            const cameraEl = document.querySelector('#teacherCam');
            const skyEl = document.querySelector('#star-sky');
            marker = document.getElementById('marker');
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            sceneEl.canvas.addEventListener('click', function(event) {
                const rect = sceneEl.canvas.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                raycaster.setFromCamera(mouse, cameraEl.getObject3D('camera'));
                const intersects = raycaster.intersectObject(skyEl.getObject3D('mesh'), true);
                
                if (intersects.length > 0) {
                    const point = intersects[0].point.clone().normalize();
                    const lat = Math.asin(point.y);
                    const lon = Math.atan2(point.z, point.x) - Math.PI;
                    
                    // Use radius of 90 (same as test marker that worked!)
                    const R = 90;
                    const x = R * Math.cos(lat) * Math.cos(lon);
                    const y = R * Math.sin(lat);
                    const z = R * Math.cos(lat) * Math.sin(lon);
                    
                    console.log('📍 Marker at:', { x: x.toFixed(1), y: y.toFixed(1), z: z.toFixed(1) });
                    
                    marker.setAttribute('position', `${x} ${y} ${z}`);
                    marker.setAttribute('visible', true);
                    
                    // Broadcast
                    db.ref("classroom/marker").set({
                        lat: lat,
                        lon: lon,
                        timestamp: Date.now()
                    });
                }
            });
            
            setupButtons();
        });
        
        function setupButtons() {
            document.querySelectorAll('.season-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    changeSeason(this.getAttribute('data-season'));
                });
            });
            
            document.getElementById('const-btn').addEventListener('click', toggleConstellations);
        }
        
        function updateSky() {
            const img = constellationsVisible ? STAR_MAPS[currentSeason].const : STAR_MAPS[currentSeason].normal;
            document.getElementById("star-sky").setAttribute("src", img);
            document.getElementById('season-display').textContent = currentSeason.charAt(0).toUpperCase() + currentSeason.slice(1);
            document.getElementById('const-display').textContent = constellationsVisible ? 'On' : 'Off';
            
            const constBtn = document.getElementById('const-btn');
            constBtn.classList.toggle('active', constellationsVisible);
            constBtn.textContent = constellationsVisible ? 'Hide Constellations' : 'Show Constellations';
            
            db.ref("classroom/currentView").set({
                season: currentSeason,
                constellations: constellationsVisible,
                timestamp: Date.now()
            });
        }
        
        function changeSeason(season) { 
            currentSeason = season; 
            updateSky(); 
        }
        
        function toggleConstellations() { 
            constellationsVisible = !constellationsVisible; 
            updateSky(); 
        }
        
        updateSky();
    </script>
</body>
</html>
