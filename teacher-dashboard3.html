<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - VR Star Map</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #000; }
        #controls { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; 
                    background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; display: flex; 
                    gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 90%; }
        button { padding: 12px 20px; margin: 0; font-weight: bold; border: none; border-radius: 8px; 
                 cursor: pointer; color: white; font-size: 14px; transition: all 0.3s ease; }
        button:hover { transform: scale(1.05); }
        .season-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        #const-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        #const-btn.active { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #000; }
        #pointer-btn { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        #pointer-btn.active { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%); }
        #target-btn { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        #target-btn.active { background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%); }
        #status { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); 
                  color: white; padding: 10px 15px; border-radius: 8px; font-size: 14px; z-index: 1000; }
        #student-panel { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.9);
                         color: white; padding: 15px; border-radius: 10px; min-width: 200px;
                         max-height: 80vh; overflow-y: auto; z-index: 1000; border: 2px solid #667eea; }
        #student-panel h3 { margin: 0 0 10px 0; color: #90caf9; font-size: 16px; }
        .student-item { padding: 8px; margin: 5px 0; background: rgba(102, 126, 234, 0.2);
                        border-radius: 5px; }
        .student-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .student-status { width: 10px; height: 10px; border-radius: 50%; background: #4CAF50;
                          animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .student-name { flex: 1; }
        .student-name.found { color: #4CAF50; font-weight: bold; }
        .student-name.not-found { color: #ff6b6b; }
        .student-time { font-size: 11px; color: #90caf9; }
        .student-rotation { font-size: 11px; color: #FFD700; font-family: monospace;
                            margin-top: 4px; background: rgba(0,0,0,0.3); padding: 4px;
                            border-radius: 3px; }
        .rotation-label { color: #90caf9; }
    </style>
</head>
<body>
    <div id="controls">
        <button class="season-btn" data-season="summer">☀️ Summer</button>
        <button class="season-btn" data-season="winter">❄️ Winter</button>
        <button class="season-btn" data-season="spring">🌸 Spring</button>
        <button class="season-btn" data-season="fall">🍂 Fall</button>
        <button id="const-btn">Show Constellations</button>
        <button id="pointer-btn">Enable Pointer</button>
        <button id="target-btn">Set Target</button>
    </div>
    
    <div id="status">
        <div>Season: <span id="season-display">Summer</span></div>
        <div>Constellations: <span id="const-display">Off</span></div>
        <div>Pointer: <span id="pointer-display">Off</span></div>
        <div>Target: <span id="target-display">Off</span></div>
    </div>
    
    <div id="student-panel">
        <h3>📱 Connected Students</h3>
        <div id="student-count" style="margin-bottom: 10px; color: #FFD700;">0 online</div>
        <div id="student-list"></div>
    </div>
    
    <a-scene>        
        <a-camera id="teacherCam" fov="60" rotation="0 180 0" look-controls wasd-controls="enabled: false"></a-camera>
        <a-sky id="star-sky" src="summer_solstice.jpeg" rotation="0 0 0" visible="true"></a-sky>
        
        <a-entity id="marker" visible="false">
            <a-ring color="#ff6b6b" radius-inner="8" radius-outer="12" 
                    material="side: double; opacity: 0.9" 
                    animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 1000; loop: true; dir: alternate">
            </a-ring>
            <a-sphere color="#ff6b6b" radius="4" 
                      material="opacity: 1; shader: flat"
                      animation="property: components.material.material.opacity; from: 1; to: 0.4; dur: 1000; loop: true; dir: alternate">
            </a-sphere>
        </a-entity>
        
        <!-- Green target marker -->
        <a-entity id="target-marker" visible="false">
            <a-ring color="#4CAF50" radius-inner="8" radius-outer="12" 
                    material="side: double; opacity: 0.9" 
                    animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 1000; loop: true; dir: alternate">
            </a-ring>
            <a-sphere color="#4CAF50" radius="4" 
                      material="opacity: 1; shader: flat"
                      animation="property: components.material.material.opacity; from: 1; to: 0.4; dur: 1000; loop: true; dir: alternate">
            </a-sphere>
        </a-entity>
    </a-scene>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUXUHdJ3oox3YSixJfoYuyRRrILe6n7ck",
            authDomain: "classroom-vrplanetarium.firebaseapp.com",
            databaseURL: "https://classroom-vrplanetarium-default-rtdb.firebaseio.com",
            projectId: "classroom-vrplanetarium",
            storageBucket: "classroom-vrplanetarium.firebasestorage.app",
            messagingSenderId: "613751774262",
            appId: "1:613751774262:web:79563f3843ef894e05cc97"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const STAR_MAPS = {
            summer: { normal: "summer_solstice.jpeg", const: "summer_solstice_constellations.jpeg" },
            winter: { normal: "winter_solstice.jpeg", const: "winter_solstice_constellations.jpeg" },
            spring: { normal: "spring_equinox.jpeg", const: "spring_equinox_constellations.jpeg" },
            fall: { normal: "fall_equinox.jpeg", const: "fall_equinox_constellations.jpeg" }
        };
        
        let currentSeason = "summer";
        let constellationsVisible = false;
        let pointerEnabled = false;
        let targetEnabled = false;
        let marker, targetMarker, starSky;
        let targetDirection = null;
        let studentCount = 0;
        
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener('loaded', function() {
            const cameraEl = document.querySelector('#teacherCam');
            starSky = document.getElementById('star-sky');
            marker = document.getElementById('marker');
            targetMarker = document.getElementById('target-marker');
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            sceneEl.canvas.addEventListener('click', function(event) {
                if (!pointerEnabled && !targetEnabled) return;
                
                const rect = sceneEl.canvas.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                raycaster.setFromCamera(mouse, cameraEl.getObject3D('camera'));
                const intersects = raycaster.intersectObject(starSky.getObject3D('mesh'), true);
                
                if (intersects.length > 0) {
                    const point = intersects[0].point;
                    const scaleFactor = 100 / point.length();
                    const scaledPoint = point.clone().multiplyScalar(scaleFactor);
                    const normalized = point.clone().normalize();
                    
                    // Place red pointer
                    if (pointerEnabled) {
                        marker.setAttribute('position', scaledPoint);
                        marker.setAttribute('visible', true);
                        
                        db.ref("classroom/marker").set({
                            x: normalized.x,
                            y: normalized.y,
                            z: normalized.z,
                            visible: true,
                            timestamp: Date.now()
                        });
                    }
                    
                    // Place green target
                    if (targetEnabled) {
                        targetMarker.setAttribute('position', scaledPoint);
                        targetMarker.setAttribute('visible', true);
                        
                        // Store target direction for student comparison
                        targetDirection = {
                            x: normalized.x,
                            y: normalized.y,
                            z: normalized.z
                        };
                        
                        db.ref("classroom/target").set({
                            x: normalized.x,
                            y: normalized.y,
                            z: normalized.z,
                            visible: true,
                            timestamp: Date.now()
                        });
                    }
                }
            });
            
            setupButtons();
            setupStudentTracking();
        });
        
        function setupStudentTracking() {
            const studentListEl = document.getElementById('student-list');
            const studentCountEl = document.getElementById('student-count');
            
            // Helper function to check if student is looking at target
            function isLookingAtTarget(studentRotation) {
                if (!targetDirection || !studentRotation) return false;
                
                // Convert student rotation to direction vector
                const yaw = studentRotation.y * Math.PI / 180;
                const pitch = studentRotation.x * Math.PI / 180;
                
                const studentDir = {
                    x: Math.cos(pitch) * Math.sin(yaw),
                    y: Math.sin(pitch),
                    z: Math.cos(pitch) * Math.cos(yaw)
                };
                
                // Calculate dot product (angle between vectors)
                const dot = studentDir.x * targetDirection.x + 
                           studentDir.y * targetDirection.y + 
                           studentDir.z * targetDirection.z;
                
                // Threshold: 0.95 ≈ 18° tolerance, 0.98 ≈ 11° tolerance
                return dot > 0.95;
            }
            
            // Listen for all students
            db.ref("classroom/students").on("value", snapshot => {
                const students = snapshot.val() || {};
                const now = Date.now();
                const activeStudents = {};
                
                // Filter to only show students active in last 10 seconds
                Object.keys(students).forEach(id => {
                    const student = students[id];
                    if (now - student.lastSeen < 10000) {
                        activeStudents[id] = student;
                    }
                });
                
                studentCount = Object.keys(activeStudents).length;
                studentCountEl.textContent = `${studentCount} online`;
                
                // Update student list
                studentListEl.innerHTML = '';
                
                if (studentCount === 0) {
                    studentListEl.innerHTML = '<div style="color: #888; font-size: 12px; padding: 10px;">No students connected</div>';
                } else {
                    Object.keys(activeStudents).forEach(id => {
                        const student = activeStudents[id];
                        const secondsAgo = Math.floor((now - student.lastSeen) / 1000);
                        const timeStr = secondsAgo === 0 ? 'just now' : `${secondsAgo}s ago`;
                        
                        // Check if looking at target
                        const foundTarget = targetEnabled && isLookingAtTarget(student.rotation);
                        const nameClass = targetEnabled ? (foundTarget ? 'found' : 'not-found') : '';
                        
                        // Get rotation info
                        let rotationHTML = '';
                        if (student.rotation) {
                            const yaw = student.rotation.y;
                            const pitch = student.rotation.x;
                            let direction = '';
                            
                            if (yaw >= -22.5 && yaw < 22.5) direction = 'South';
                            else if (yaw >= 22.5 && yaw < 67.5) direction = 'SW';
                            else if (yaw >= 67.5 && yaw < 112.5) direction = 'West';
                            else if (yaw >= 112.5 && yaw < 157.5) direction = 'NW';
                            else if (yaw >= 157.5 || yaw < -157.5) direction = 'North';
                            else if (yaw >= -157.5 && yaw < -112.5) direction = 'NE';
                            else if (yaw >= -112.5 && yaw < -67.5) direction = 'East';
                            else if (yaw >= -67.5 && yaw < -22.5) direction = 'SE';
                            
                            let verticalDesc = '';
                            if (pitch < -60) verticalDesc = '(far down)';
                            else if (pitch < -30) verticalDesc = '(down)';
                            else if (pitch < -10) verticalDesc = '(slight down)';
                            else if (pitch <= 10) verticalDesc = '(horizon)';
                            else if (pitch <= 30) verticalDesc = '(slight up)';
                            else if (pitch <= 60) verticalDesc = '(up)';
                            else verticalDesc = '(far up)';
                            
                            rotationHTML = `
                                <div class="student-rotation">
                                    <span class="rotation-label">Az:</span> ${direction} (${yaw}°)<br>
                                    <span class="rotation-label">Alt:</span> ${pitch}° ${verticalDesc}
                                </div>
                            `;
                        }
                        
                        const div = document.createElement('div');
                        div.className = 'student-item';
                        div.innerHTML = `
                            <div class="student-header">
                                <div class="student-status"></div>
                                <div class="student-name ${nameClass}">${student.name || 'Student ' + id.slice(-4)}</div>
                                <div class="student-time">${timeStr}</div>
                            </div>
                            ${rotationHTML}
                        `;
                        studentListEl.appendChild(div);
                    });
                }
            });
        }
        
        function toggleTarget() {
            targetEnabled = !targetEnabled;
            const btn = document.getElementById('target-btn');
            
            btn.classList.toggle('active', targetEnabled);
            btn.textContent = targetEnabled ? 'Disable Target' : 'Set Target';
            document.getElementById('target-display').textContent = targetEnabled ? 'On' : 'Off';
            
            if (!targetEnabled) {
                targetMarker.setAttribute('visible', false);
                targetDirection = null;
                db.ref("classroom/target").set({
                    visible: false,
                    timestamp: Date.now()
                });
            }
        }
        
        function setupButtons() {
            document.querySelectorAll('.season-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    changeSeason(this.getAttribute('data-season'));
                });
            });
            
            document.getElementById('const-btn').addEventListener('click', toggleConstellations);
            document.getElementById('pointer-btn').addEventListener('click', togglePointer);
            document.getElementById('target-btn').addEventListener('click', toggleTarget);
        }
        
        function togglePointer() {
            pointerEnabled = !pointerEnabled;
            const btn = document.getElementById('pointer-btn');
            
            btn.classList.toggle('active', pointerEnabled);
            btn.textContent = pointerEnabled ? 'Disable Pointer' : 'Enable Pointer';
            document.getElementById('pointer-display').textContent = pointerEnabled ? 'On' : 'Off';
            
            if (!pointerEnabled) {
                marker.setAttribute('visible', false);
                db.ref("classroom/marker").set({
                    visible: false,
                    timestamp: Date.now()
                });
            }
        }
        
        function updateSky() {
            const img = constellationsVisible ? STAR_MAPS[currentSeason].const : STAR_MAPS[currentSeason].normal;
            starSky.setAttribute("src", img);
            document.getElementById('season-display').textContent = currentSeason.charAt(0).toUpperCase() + currentSeason.slice(1);
            document.getElementById('const-display').textContent = constellationsVisible ? 'On' : 'Off';
            
            const constBtn = document.getElementById('const-btn');
            constBtn.classList.toggle('active', constellationsVisible);
            constBtn.textContent = constellationsVisible ? 'Hide Constellations' : 'Show Constellations';
            
            db.ref("classroom/currentView").set({
                mode: 'image',
                season: currentSeason,
                constellations: constellationsVisible,
                timestamp: Date.now()
            });
        }
        
        function changeSeason(season) { 
            currentSeason = season; 
            updateSky(); 
        }
        
        function toggleConstellations() { 
            constellationsVisible = !constellationsVisible; 
            updateSky(); 
        }
        
        updateSky();
    </script>
</body>
</html>
