<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student View</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        #name-prompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            font-family: Arial, sans-serif;
        }
        #name-prompt.hidden { display: none; }
        .name-dialog {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
        }
        .name-dialog h2 {
            color: white;
            margin: 0 0 20px 0;
            font-size: 24px;
        }
        .name-dialog input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .name-dialog button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .name-dialog button:hover {
            transform: scale(1.05);
        }
        
        /* Success celebration */
        #success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%);
            color: white;
            padding: 40px 60px;
            border-radius: 20px;
            font-size: 48px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            z-index: 9999;
            box-shadow: 0 20px 60px rgba(76, 175, 80, 0.6);
            pointer-events: none;
            opacity: 0;
        }
        #success-message.show {
            animation: successPop 2s ease-out forwards;
        }
        @keyframes successPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(0.95); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
        
        /* Confetti particles */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            position: absolute;
            animation: confettiFall 3s ease-out forwards;
            z-index: 9998;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Success message -->
    <div id="success-message">🎯 TARGET FOUND! ⭐</div>
    
    <!-- Name entry prompt -->
    <div id="name-prompt">
        <div class="name-dialog">
            <h2>🌟 VR Star Map</h2>
            <input type="text" id="student-name-input" placeholder="Enter your name" maxlength="20" autocomplete="off">
            <button id="start-button" onclick="startSession()">Start Viewing</button>
        </div>
    </div>
    
    <a-scene device-orientation-permission-ui="enabled: true">
        <a-assets>
            <video id="starry-video" src="starrysky.mp4" loop crossorigin="anonymous"></video>
        </a-assets>

        <a-camera fov="60" rotation="0 180 0" look-controls="magicWindowTrackingEnabled: true; touchEnabled: false" wasd-controls="enabled: false">
            <!-- Grey target feedback circle (always centered in view) -->
            <a-entity id="target-circle" visible="false">
                <a-ring id="target-ring" position="0 0 -2" radius-inner="0.28" radius-outer="0.32" 
                        color="#808080" material="side: double; opacity: 0.4; transparent: true">
                </a-ring>
            </a-entity>
        </a-camera>

        <!-- Static sky -->
        <a-sky id="sky" src="summer_solstice.jpeg" rotation="0 0 0" visible="true"></a-sky>

        <!-- Video sky -->
        <a-videosphere id="videoSky" src="#starry-video" rotation="0 0 0" visible="false"></a-videosphere>

        <a-entity id="pointer" visible="false">
            <a-ring color="#ff6b6b" radius-inner="8" radius-outer="12"
                    material="side: double; opacity: 0.9"
                    animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 1000; loop: true; dir: alternate">
            </a-ring>
            <a-sphere color="#ff6b6b" radius="4"
                      material="opacity: 1; shader: flat"
                      animation="property: components.material.material.opacity; from: 1; to: 0.4; dur: 1000; loop: true; dir: alternate">
            </a-sphere>
        </a-entity>
    </a-scene>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUXUHdJ3oox3YSixJfoYuyRRrILe6n7ck",
            authDomain: "classroom-vrplanetarium.firebaseapp.com",
            databaseURL: "https://classroom-vrplanetarium-default-rtdb.firebaseio.com",
            projectId: "classroom-vrplanetarium",
            storageBucket: "classroom-vrplanetarium.firebasestorage.app",
            messagingSenderId: "613751774262",
            appId: "1:613751774262:web:79563f3843ef894e05cc97"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const IMAGES = {
            summer: { normal: "summer_solstice.jpeg", const: "summer_solstice_constellations.jpeg" },
            winter: { normal: "winter_solstice.jpeg", const: "winter_solstice_constellations.jpeg" },
            spring: { normal: "spring_equinox.jpeg", const: "spring_equinox_constellations.jpeg" },
            fall:   { normal: "fall_equinox.jpeg",   const: "fall_equinox_constellations.jpeg" }
        };

        let pointer, sky, videoSky, videoElem, targetCircle, targetRing;
        let targetDirection = null;
        let hasFoundTarget = false;
        let studentId = 'student_' + Math.random().toString(36).substr(2, 9);
        let studentName = '';
        let heartbeatInterval;
        let camera;
        
        // Success audio
        const successAudio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFApGn+DyvmwhBjiP1fPMeTEGJHfH8N+UQQoUXrTp66hVFA==');
        
        function celebrate() {
            // Show success message
            const msg = document.getElementById('success-message');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 2000);
            
            // Play sound
            successAudio.play().catch(e => console.log('Audio play failed:', e));
            
            // Vibrate if available
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200]);
            }
            
            // Create confetti
            createConfetti();
        }
        
        function createConfetti() {
            const colors = ['#FFD700', '#4CAF50', '#2196F3', '#FF4081', '#9C27B0', '#FF9800'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3500);
                }, i * 30);
            }
        }
        
        // Start session after name is entered
        function startSession() {
            const nameInput = document.getElementById('student-name-input');
            const name = nameInput.value.trim();
            
            if (name.length === 0) {
                alert('Please enter your name');
                return;
            }
            
            studentName = name;
            document.getElementById('name-prompt').classList.add('hidden');
            
            // Start heartbeat after name is set
            sendHeartbeat();
            heartbeatInterval = setInterval(sendHeartbeat, 500);
        }
        
        // Allow Enter key to submit
        document.addEventListener('DOMContentLoaded', function() {
            const nameInput = document.getElementById('student-name-input');
            nameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    startSession();
                }
            });
            nameInput.focus();
        });
        
        // Send heartbeat and camera rotation
        function sendHeartbeat() {
            const data = {
                name: studentName || "Student " + studentId.slice(-4),
                lastSeen: Date.now(),
                connected: true
            };
            
            // Add camera rotation if available
            if (camera) {
                const rotation = camera.getAttribute('rotation');
                // Account for initial 180° rotation
                data.rotation = {
                    x: Math.round(rotation.x),
                    y: Math.round(rotation.y),
                    z: Math.round(rotation.z)
                };
            }
            
            db.ref("classroom/students/" + studentId).set(data);
        }
        
        // Clean up when leaving
        window.addEventListener('beforeunload', () => {
            db.ref("classroom/students/" + studentId).remove();
            clearInterval(heartbeatInterval);
        });

        document.querySelector('a-scene').addEventListener('loaded', function() {
            pointer  = document.getElementById('pointer');
            sky      = document.getElementById('sky');
            videoSky = document.getElementById('videoSky');
            videoElem = document.getElementById('starry-video');
            camera   = document.querySelector('a-camera');
            targetCircle = document.getElementById('target-circle');
            targetRing = document.getElementById('target-ring');
            console.log('✅ Mono student scene ready');
        });

        // Listen for view changes
        db.ref("classroom/currentView").on("value", snap => {
            const state = snap.val();
            if (!state || !sky) return;

            if (state.mode === 'video') {
                sky.setAttribute('visible', false);
                videoSky.setAttribute('visible', true);
                state.playing ? videoElem.play() : videoElem.pause();
            } else {
                videoElem.pause();
                videoSky.setAttribute('visible', false);
                sky.setAttribute('visible', true);
                const img = state.constellations ? IMAGES[state.season].const : IMAGES[state.season].normal;
                sky.setAttribute("src", img);
            }
        });

        // Marker updates
        db.ref("classroom/marker").on("value", snap => {
            const data = snap.val();
            if (!data || !pointer) return;

            if (data.visible === false) {
                pointer.setAttribute('visible', false);
                return;
            }

            const x = data.x * 100;
            const y = data.y * 100;
            const z = data.z * 100;

            pointer.setAttribute("position", `${x} ${y} ${z}`);
            pointer.setAttribute("visible", true);
        });
        
        // Target updates - show grey circle when target is active
        db.ref("classroom/target").on("value", snap => {
            const data = snap.val();
            if (!data || !targetCircle) return;
            
            if (data.visible === false) {
                targetCircle.setAttribute('visible', false);
                targetDirection = null;
                hasFoundTarget = false;
            } else {
                targetCircle.setAttribute('visible', true);
                hasFoundTarget = false;
                
                // Store target direction for checking
                targetDirection = {
                    x: data.x,
                    y: data.y,
                    z: data.z
                };
            }
        });
        
        // Check if looking at target every 200ms
        setInterval(function() {
            if (!targetDirection || !camera || !targetRing) return;
            
            const rotation = camera.getAttribute('rotation');
            const yawRad = rotation.y * Math.PI / 180;
            const pitchRad = -rotation.x * Math.PI / 180;
            
            const studentDir = {
                x: Math.sin(yawRad) * Math.cos(pitchRad),
                y: Math.sin(pitchRad),
                z: Math.cos(yawRad) * Math.cos(pitchRad)
            };
            
            // Normalize
            const len = Math.sqrt(studentDir.x * studentDir.x + studentDir.y * studentDir.y + studentDir.z * studentDir.z);
            studentDir.x /= len;
            studentDir.y /= len;
            studentDir.z /= len;
            
            // Calculate dot product
            const dot = studentDir.x * targetDirection.x + 
                       studentDir.y * targetDirection.y + 
                       studentDir.z * targetDirection.z;
            
            // Check if looking at target (within tolerance)
            // Tighter tolerance: 0.96 ≈ 14° - must be centered in ring
            // No Math.abs - opposite direction shouldn't count
            const foundTarget = dot > 0.96;
            
            // Debug logging
            if (dot > 0.90) {
                console.log('Getting close! Dot:', dot.toFixed(3), 'Found:', foundTarget);
            }
            
            // Trigger celebration on first find
            if (foundTarget && !hasFoundTarget) {
                hasFoundTarget = true;
                console.log('🎉 CELEBRATION TRIGGERED!');
                celebrate();
            }
            
            // Change color based on whether target is found
            const color = foundTarget ? '#4CAF50' : '#808080'; // Green if found, grey if not
            targetRing.setAttribute('color', color);
        }, 200);
    </script>
</body>
</html>
